databases:
  - name: skillify-db
    databaseName: skillify
    user: skillify
    plan: free

services:
  - type: web
    name: skillify
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn skillify_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillify-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.6"
