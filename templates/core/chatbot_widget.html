<!-- Skillify Chatbot Widget -->
<div id="chatbotWidget">
    <!-- Toggle Button -->
    <button id="chatbotToggle" onclick="toggleChatbot()" title="Chat with Skilly">
        <span class="chat-icon"><i class="bi bi-robot"></i></span>
        <span class="close-icon" style="display:none;"><i class="bi bi-x-lg"></i></span>
        <span class="chatbot-pulse"></span>
    </button>

    <!-- Chat Window -->
    <div id="chatbotWindow" style="display:none;">
        <div class="chatbot-header">
            <div class="chatbot-header-info">
                <div class="chatbot-avatar">
                    <i class="bi bi-robot"></i>
                </div>
                <div>
                    <strong>Skilly</strong>
                    <small class="d-block" style="opacity:0.8;">Skillify Assistant</small>
                </div>
            </div>
            <button onclick="toggleChatbot()" class="chatbot-close-btn"><i class="bi bi-x-lg"></i></button>
        </div>

        <div class="chatbot-messages" id="chatbotMessages">
            <!-- Welcome message -->
            <div class="bot-msg">
                <div class="bot-msg-avatar"><i class="bi bi-robot"></i></div>
                <div class="bot-msg-bubble">
                    Hey! 👋 I'm <strong>Skilly</strong>, your Skillify assistant.<br>
                    I can help you find tutors, book sessions, and answer questions!
                </div>
            </div>
            <div class="chatbot-suggestions" id="initialSuggestions">
                <button onclick="sendSuggestion('Find a tutor')">🔍 Find a tutor</button>
                <button onclick="sendSuggestion('How to book')">📅 How to book</button>
                <button onclick="sendSuggestion('What is Skillify')">ℹ️ About Skillify</button>
                <button onclick="sendSuggestion('Help')">❓ Help</button>
            </div>
        </div>

        <div class="chatbot-input-area">
            <input type="text" id="chatbotInput" placeholder="Ask me anything..." maxlength="500" autocomplete="off">
            <button id="chatbotSendBtn" onclick="sendChatMessage()">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>
    </div>
</div>

<style>
/* ===== Chatbot Toggle Button ===== */
#chatbotToggle {
    position: fixed; bottom: 24px; right: 90px; z-index: 9998;
    width: 60px; height: 60px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; font-size: 1.5rem; cursor: pointer;
    box-shadow: 0 6px 25px rgba(102,126,234,0.45);
    transition: all 0.3s; display: flex; align-items: center; justify-content: center;
}
#chatbotToggle:hover { transform: scale(1.08); box-shadow: 0 8px 30px rgba(102,126,234,0.6); }
.chatbot-pulse {
    position: absolute; width: 100%; height: 100%; border-radius: 50%;
    border: 3px solid #667eea; animation: chatPulse 2s infinite;
}
@keyframes chatPulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.5); opacity: 0; }
}

/* ===== Chat Window ===== */
#chatbotWindow {
    position: fixed; bottom: 100px; right: 90px; z-index: 9999;
    width: 380px; max-height: 520px; border-radius: 20px;
    background: #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.18);
    display: flex; flex-direction: column; overflow: hidden;
    animation: chatSlideUp 0.3s ease;
}
@keyframes chatSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Header */
.chatbot-header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; padding: 14px 18px; display: flex;
    align-items: center; justify-content: space-between;
}
.chatbot-header-info { display: flex; align-items: center; gap: 10px; }
.chatbot-avatar {
    width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
}
.chatbot-close-btn {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
}
.chatbot-close-btn:hover { background: rgba(255,255,255,0.3); }

/* Messages Area */
.chatbot-messages {
    flex: 1; overflow-y: auto; padding: 16px; display: flex;
    flex-direction: column; gap: 12px; max-height: 360px; min-height: 300px;
}
.chatbot-messages::-webkit-scrollbar { width: 5px; }
.chatbot-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

/* Bot Message */
.bot-msg { display: flex; gap: 8px; max-width: 90%; animation: msgFade 0.3s ease; }
.bot-msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
    margin-top: 2px;
}
.bot-msg-bubble {
    background: #f0f2f5; color: #333; padding: 10px 14px;
    border-radius: 4px 16px 16px 16px; font-size: 0.85rem; line-height: 1.5;
    word-wrap: break-word;
}
.bot-msg-bubble strong { color: #333; }
.bot-msg-bubble a { color: #667eea; text-decoration: underline; }

/* User Message */
.user-msg {
    display: flex; justify-content: flex-end; max-width: 85%;
    margin-left: auto; animation: msgFade 0.3s ease;
}
.user-msg-bubble {
    background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    padding: 10px 14px; border-radius: 16px 4px 16px 16px;
    font-size: 0.85rem; line-height: 1.5;
}

@keyframes msgFade {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Typing Indicator */
.typing-indicator {
    display: flex; gap: 4px; padding: 10px 14px;
    background: #f0f2f5; border-radius: 16px; width: fit-content;
}
.typing-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #999;
    animation: typingBounce 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
}

/* Suggestions */
.chatbot-suggestions {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
}
.chatbot-suggestions button {
    background: #fff; border: 1.5px solid #667eea; color: #667eea;
    padding: 5px 12px; border-radius: 20px; font-size: 0.75rem;
    cursor: pointer; font-weight: 600; transition: all 0.2s;
    white-space: nowrap;
}
.chatbot-suggestions button:hover {
    background: #667eea; color: #fff;
}

/* Input Area */
.chatbot-input-area {
    padding: 12px; border-top: 1px solid #e9ecef;
    display: flex; gap: 8px; background: #fff;
}
.chatbot-input-area input {
    flex: 1; border: 2px solid #e9ecef; border-radius: 24px;
    padding: 10px 16px; font-size: 0.85rem; outline: none;
    font-family: 'Inter', sans-serif;
}
.chatbot-input-area input:focus { border-color: #667eea; }
#chatbotSendBtn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 1rem; transition: transform 0.2s; flex-shrink: 0;
}
#chatbotSendBtn:hover { transform: scale(1.08); }

/* Mobile */
@media (max-width: 480px) {
    #chatbotWindow { width: calc(100vw - 20px); right: 10px; bottom: 90px; }
}

/* Dark Mode */
body.dark-theme #chatbotWindow { background: #16213e; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
body.dark-theme .chatbot-messages { background: #1a1a2e; }
body.dark-theme .bot-msg-bubble { background: #0f3460; color: #e0e0e0; }
body.dark-theme .bot-msg-bubble strong { color: #f0f0f0; }
body.dark-theme .bot-msg-bubble a { color: #8ab4f8; }
body.dark-theme .user-msg-bubble { background: linear-gradient(135deg, #667eea, #764ba2); }
body.dark-theme .chatbot-input-area { background: #16213e; border-color: #2a2a4a; }
body.dark-theme .chatbot-input-area input { background: #0f3460; border-color: #2a2a4a; color: #e0e0e0; }
body.dark-theme .chatbot-suggestions button { background: #0f3460; border-color: #667eea; color: #8ab4f8; }
body.dark-theme .chatbot-suggestions button:hover { background: #667eea; color: #fff; }
body.dark-theme .typing-indicator { background: #0f3460; }
</style>

<script>
(function() {
    const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content
        || document.querySelector('[name=csrfmiddlewaretoken]')?.value
        || '{{ csrf_token }}';

    window.toggleChatbot = function() {
        const win = document.getElementById('chatbotWindow');
        const chatIcon = document.querySelector('.chat-icon');
        const closeIcon = document.querySelector('.close-icon');
        const pulse = document.querySelector('.chatbot-pulse');
        const isOpen = win.style.display !== 'none';

        win.style.display = isOpen ? 'none' : 'flex';
        chatIcon.style.display = isOpen ? 'inline' : 'none';
        closeIcon.style.display = isOpen ? 'none' : 'inline';
        if (pulse) pulse.style.display = isOpen ? 'block' : 'none';

        if (!isOpen) {
            document.getElementById('chatbotInput').focus();
            scrollChatToBottom();
        }
    };

    window.sendChatMessage = function() {
        const input = document.getElementById('chatbotInput');
        const msg = input.value.trim();
        if (!msg) return;

        appendUserMessage(msg);
        input.value = '';
        showTyping();

        fetch('/api/chatbot/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken,
            },
            body: JSON.stringify({ message: msg }),
        })
        .then(r => r.json())
        .then(data => {
            hideTyping();
            appendBotMessage(data.message);
            if (data.suggestions && data.suggestions.length > 0) {
                appendSuggestions(data.suggestions);
            }
        })
        .catch(() => {
            hideTyping();
            appendBotMessage("Sorry, something went wrong. Please try again!");
        });
    };

    window.sendSuggestion = function(text) {
        document.getElementById('chatbotInput').value = text;
        sendChatMessage();
    };

    // Enter to send
    document.addEventListener('DOMContentLoaded', function() {
        const input = document.getElementById('chatbotInput');
        if (input) {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') sendChatMessage();
            });
        }
    });

    function appendUserMessage(text) {
        const container = document.getElementById('chatbotMessages');
        const div = document.createElement('div');
        div.className = 'user-msg';
        div.innerHTML = '<div class="user-msg-bubble">' + escapeHtml(text) + '</div>';
        container.appendChild(div);
        scrollChatToBottom();
    }

    function appendBotMessage(text) {
        const container = document.getElementById('chatbotMessages');
        const div = document.createElement('div');
        div.className = 'bot-msg';

        // Convert markdown-like formatting
        let html = escapeHtml(text);
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
        html = html.replace(/_(.+?)_/g, '<em>$1</em>');
        html = html.replace(/\n/g, '<br>');

        div.innerHTML = `
            <div class="bot-msg-avatar"><i class="bi bi-robot"></i></div>
            <div class="bot-msg-bubble">${html}</div>
        `;
        container.appendChild(div);
        scrollChatToBottom();
    }

    function appendSuggestions(suggestions) {
        const container = document.getElementById('chatbotMessages');
        const div = document.createElement('div');
        div.className = 'chatbot-suggestions';
        suggestions.forEach(function(s) {
            const btn = document.createElement('button');
            btn.textContent = s;
            btn.onclick = function() { sendSuggestion(s); };
            div.appendChild(btn);
        });
        container.appendChild(div);
        scrollChatToBottom();
    }

    function showTyping() {
        const container = document.getElementById('chatbotMessages');
        const div = document.createElement('div');
        div.className = 'bot-msg';
        div.id = 'typingIndicator';
        div.innerHTML = `
            <div class="bot-msg-avatar"><i class="bi bi-robot"></i></div>
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        `;
        container.appendChild(div);
        scrollChatToBottom();
    }

    function hideTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function scrollChatToBottom() {
        const container = document.getElementById('chatbotMessages');
        container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
})();
</script>
