{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Session - Skillify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
    <link rel="stylesheet" href="{% static 'css/dark-mode.css' %}
    <link rel="stylesheet" href="{% static 'css/mobile.css' %}">">
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" style="position:fixed;bottom:20px;right:20px;z-index:999;width:45px;height:45px;border-radius:50%;border:none;background:#667eea;color:#fff;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,0.2);transition:all 0.3s;"><i class="bi bi-moon-stars-fill"></i></button>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}"><i class="bi bi-lightbulb-fill"></i><span>Skillify</span></a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_sessions' %}">My Sessions</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body p-4">
                        <h3 class="mb-4"><i class="bi bi-plus-circle"></i> Create New Session</h3>

                        {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                        {% endif %}

                        <form method="POST" action="{% url 'create_session' %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="title" class="form-label">Session Title *</label>
                                <input type="text" class="form-control" id="title" name="title" required placeholder="e.g., Python Programming Fundamentals">
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" name="description" rows="4" placeholder="Describe what learners will gain from this session..."></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="skill" class="form-label">Skill *</label>
                                <select class="form-select" id="skill" name="skill" required>
                                    <option value="">Choose a skill...</option>
                                    {% for skill in skills %}
                                    <option value="{{ skill.pk }}">{{ skill.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="level" class="form-label">Level *</label>
                                <select class="form-select" id="level" name="level" required>
                                    <option value="all">All Levels</option>
                                    <option value="beginner">Beginner</option>
                                    <option value="intermediate">Intermediate</option>
                                    <option value="advanced">Advanced</option>
                                </select>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="date" class="form-label">Date *</label>
                                    <input type="date" class="form-control" id="date" name="date" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="start_time" class="form-label">Start Time *</label>
                                    <input type="time" class="form-control" id="start_time" name="start_time" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="end_time" class="form-label">End Time *</label>
                                    <input type="time" class="form-control" id="end_time" name="end_time" required>
                                </div>
                            </div>
                            <script>
                            (function(){
                                // Set min date to today
                                var today = new Date().toISOString().split('T')[0];
                                document.getElementById('date').setAttribute('min', today);
                                document.getElementById('date').value = today;

                                // Validate on submit
                                var form = document.getElementById('date').closest('form');
                                form.addEventListener('submit', function(e){
                                    var d = document.getElementById('date').value;
                                    var st = document.getElementById('start_time').value;
                                    var et = document.getElementById('end_time').value;
                                    var now = new Date();
                                    var selDate = new Date(d);
                                    var todayDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());

                                    if(selDate < todayDate){
                                        e.preventDefault();
                                        alert('Cannot select a past date.');
                                        return false;
                                    }
                                    if(d === today && st){
                                        var h = now.getHours(), m = now.getMinutes();
                                        var curr = ('0'+h).slice(-2)+':'+('0'+m).slice(-2);
                                        if(st <= curr){
                                            e.preventDefault();
                                            alert('Start time must be in the future for today.');
                                            return false;
                                        }
                                    }
                                    if(st && et && et <= st){
                                        e.preventDefault();
                                        alert('End time must be after start time.');
                                        return false;
                                    }
                                });
                            })();
                            </script>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="credits_required" class="form-label">Credits Required *</label>
                                    <input type="number" class="form-control" id="credits_required" name="credits_required" min="10" value="50" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="session_type" class="form-label">Session Type</label>
                                    <select class="form-select" id="session_type" name="session_type">
                                        <option value="one-to-one">One-to-One</option>
                                        <option value="group">Group</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="max_participants" class="form-label">Max Participants</label>
                                    <input type="number" class="form-control" id="max_participants" name="max_participants" min="1" value="1">
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle"></i> Create Session
                                </button>
                                <a href="{% url 'my_sessions' %}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% include "core/chatbot_widget.html" %}
    <script src="{% static 'js/dark-mode.js' %}"></script>
</body>
</html>
